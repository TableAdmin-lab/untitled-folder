name: Scrape Yoco data

on:
  workflow_dispatch:
    inputs:
      date_mode:
        description: "Scraping date mode (auto, monday, wednesday, friday, custom)"
        required: false
        default: "auto"
      start_date:
        description: "Custom start date (YYYY-MM-DD)"
        required: false
        default: ""
      end_date:
        description: "Custom end date (YYYY-MM-DD)"
        required: false
        default: ""
  schedule:
    - cron: "0 4 * * *" # 06:00 SAST (UTC+2, no DST)

# Queue runs one at a time instead of overlapping — only one login/scrape
# should be in flight against a given Yoco account's secrets at once.
# cancel-in-progress is false on purpose: a queued run WAITS for the
# current one to finish rather than killing it or racing it.
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (with deps)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        working-directory: scraper
        run: npx playwright install-deps chromium

      - name: Scrape
        working-directory: scraper
        env:
          YOCO_EMAIL: ${{ secrets.YOCO_EMAIL }}
          YOCO_PASSWORD: ${{ secrets.YOCO_PASSWORD }}
          DATE_MODE: ${{ github.event.inputs.date_mode }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
        run: npm run scrape

      - name: Commit updated data
        run: |
          git config user.name "yoco-pulse-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: refresh report"
          git push -f origin HEAD:data

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: debug/
          retention-days: 7
